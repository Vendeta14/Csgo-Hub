<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSGO Hub - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body class="login-page">

<div class="glass-card login-box">

    <h1 class="logo">CSGO HUB</h1>

    <p class="text-light text-center mb-4">
        Enter with your instagram account
    </p>

    <form action="home.html">

        <div class="mb-3">
            <input type="email" class="form-control custom-input" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <input type="password" class="form-control custom-input" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-orange w-100 mb-3">
            Login
        </button>

        <div class="text-center">
            <a href="signup.html" class="text-decoration-none text-light">
                Create Account
            </a>
        </div>

    </form>

</div>

</body>
</html>
