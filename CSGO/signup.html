<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="glass-card login-box">

<h2 class="logo">CREATE ACCOUNT</h2>

<form>

<input class="form-control custom-input mb-3" placeholder="Username" required>

<input class="form-control custom-input mb-3" placeholder="Email" required>

<input class="form-control custom-input mb-3" type="password" placeholder="Password" required>

<button class="btn btn-orange w-100">
Register
</button>

<div class="text-center mt-3">
<a href="index.html" class="text-light">
Back to Login
</a>
</div>

</form>

</div>

</div>

</body>
</html>
